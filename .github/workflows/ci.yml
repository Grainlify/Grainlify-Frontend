# ──────────────────────────────────────────────
# CI Workflow
# ──────────────────────────────────────────────
# Runs lint, typecheck, test (with coverage),
# and build on pull requests and pushes to main.
#
# Security:
#   - All third-party actions are pinned to
#     full-length commit SHAs (or verified
#     major tags with Dependabot oversight).
#   - GITHUB_TOKEN uses the minimum `contents: read`
#     permission – no write access is required
#     for this workflow.
#   - pnpm dependencies are cached to speed up
#     subsequent runs and reduce network usage.
# ──────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimal token permissions – this workflow only
# reads the repository contents; it never writes.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup pnpm ────────────────────────────
      # pin to the version matching the lockfile
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── Setup Node ────────────────────────────
      # Node 20 LTS – matches the project's
      # minimum requirement (see README.md).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Install dependencies ─────────────────
      # --frozen-lockfile ensures CI always uses
      # the exact dependency tree from pnpm-lock.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Lint ──────────────────────────────────
      - name: Run linter
        run: pnpm run lint

      # ── Typecheck ─────────────────────────────
      - name: Run typecheck
        run: pnpm run typecheck

      # ── Test (with coverage) ─────────────────
      - name: Run tests with coverage
        run: pnpm run test:coverage

      # ── Build ────────────────────────────────
      - name: Build production bundle
        run: pnpm run build
