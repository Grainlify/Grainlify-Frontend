name: E2E

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NO_PROXY: 127.0.0.1,localhost
      VITE_API_BASE_URL: http://127.0.0.1:8080
      VITE_FRONTEND_BASE_URL: http://127.0.0.1:5173
      no_proxy: 127.0.0.1,localhost

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chrome
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p \"require('./package-lock.json').packages['node_modules/@playwright/test'].version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run Playwright e2e
        run: npm run test:e2e -- --project=${{ matrix.project }} --reporter=list,html

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
